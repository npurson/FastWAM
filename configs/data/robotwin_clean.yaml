  shape_meta: &robotwin_clean_shape_meta
    images:
      - key: cam_high
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_left_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_right_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14
        shape: 14
    state:
      - key: default
        raw_shape: 14
        shape: 14
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [384, 320]
  camera_key: null
  val_set_proportion: 0.01
  is_training_set: true
  pretrained_norm_stats: /horizon-bucket/robot_lab/users/haoyi.jiang/repos/fastwam/robotwin2.0-starVLA-clean2rand/dataset_stats.json
  skip_padding_as_possible: false
  concat_multi_camera: "robotwin"
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14

    action_state_transforms: null
    use_stepwise_action_norm: False
    norm_default_mode: "z-score"
    norm_exception_mode: null

    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign

    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: /horizon-bucket/robot_lab/users/haoyi.jiang/repos/fastwam/robotwin2.0-starVLA-clean2rand/text_embeds
  context_len: 128

