defaults:
  - fastwam
  - _self_

_target_: fastwam.runtime.create_vrfa

representation_forcing:
  enabled: true
  mode: repa
  layer_indices: [15]
  projector_hidden_dim: ${model.video_dit_config.hidden_dim}
  loss_weight: 0.1
  normalize_target: false
  detach_alignment_input: false
  temporal_align_mode: strict
  spatial_align_mode: interpolate
  target_temporal_sampling: explicit
  ## Geometric forcing
  # mode: gf
  # angular_weight: 1.0
  # scale_weight: 1.0

  ## ReDi
  # mode: redi
  # loss_weight: 0.2
  # redi_drop_prob: 0.0
  # redi_condition_first_frame: false

  # pca:
  #   enabled: false
  #   dim: 16
  #   stats_path: null
  #   fit_on_the_fly: false

  ## VGGT
  target_temporal_indices: [0, 3, 7]
  target_temporal_groups: null
  encoder:
    name: vggt
    camera_layout: robotwin
    num_cameras: 3
    model_id: facebook/VGGT-1B
    input_size: [224, 280]
    output_dim: 2048

